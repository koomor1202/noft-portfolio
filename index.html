<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NOFT DesignWorks | Portfolio</title>
    <meta name="description" content="NOFT DesignWorks のポートフォリオサイトです。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="./site-data.js" defer></script>
    <script src="./site.js" defer></script>
  </head>
  <body data-page="home">
    <div class="site-shell">
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="./index.html" aria-label="NOFT DesignWorks">
            <img class="brand__image" src="./assets/noft-logo.png" alt="NOFT DesignWorks">
          </a>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-label="menu" data-menu-toggle>MENU</button>
          <nav class="site-nav" data-menu>
            <a class="site-nav__link" data-nav-key="home" href="./index.html">HOME</a>
            <a class="site-nav__link" data-nav-key="about" href="./about/index.html">ABOUT</a>
            <a class="site-nav__link" data-nav-key="works" href="./works/index.html">WORKS</a>
            <a class="site-nav__link" href="https://noft-designworks.com/">OFFICIAL</a>
          </nav>
        </div>
      </header>

      <main class="page-main">
        <section class="hero-wrap" data-reveal>
          <div class="hero-frame">
            <div class="hero-track" data-hero-track></div>
            <div class="hero-meta" data-hero-meta></div>
          </div>
        </section>

        <section class="page-section">
          <div class="page-body">
            <div class="section-head" data-reveal>
              <h2 class="section-title">WORKS</h2>
            </div>
            <div class="works-grid" data-home-works></div>
            <a class="text-link" href="./works/index.html" data-reveal>
              <span>VIEW ALL WORKS</span>
              <span class="text-link__arrow"></span>
            </a>
          </div>
        </section>
      </main>

      <section class="home-bottom-panel">
        <div class="home-bottom-panel__inner">
          <div class="estimate-promo" data-estimate-promo data-reveal></div>

          <section class="contact-band home-bottom-panel__contact">
            <div class="contact-band__inner">
              <div class="contact-band__eyebrow">CONTACT</div>
              <div class="contact-band__actions" data-contact-band-actions></div>
            </div>
          </section>

          <footer class="site-footer home-bottom-panel__footer">
            <div class="site-footer__inner">
              <div class="footer-meta">
                <nav class="footer-nav">
                  <a class="footer-nav__link" href="./index.html">HOME</a>
                  <a class="footer-nav__link" href="./about/index.html">ABOUT</a>
                  <a class="footer-nav__link" href="./works/index.html">WORKS</a>
                  <a class="footer-nav__link" href="https://noft-designworks.com/">OFFICIAL</a>
                </nav>
              </div>
              <div class="footer-aside">
                <div class="footer-copy">&copy; 2026 NOFT Design Works. All rights reserved.</div>
              </div>
            </div>
          </footer>
        </div>
      </section>
    </div>
  </body>
</html>
